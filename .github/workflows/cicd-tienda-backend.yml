name: CI/CD Backend
on:
  push:
    paths:
      - 'backend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        
      - name: Configurar AWS
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}
          
      - name: Login ECR
        run: aws ecr get-login-password | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}
        
      - name: Build imagen
        run: docker build -t backend ./backend
        
      - name: Tag imagen
        run: docker tag backend:latest ${{ secrets.ECR_REPO_URL_BACKEND }}:latest
        
      - name: Push imagen
        run: docker push ${{ secrets.ECR_REPO_URL_BACKEND }}:latest
        
      - name: Deploy a EC2 Backend via SSM
        run: |
          aws ssm send-command \
            --instance-ids ${{ secrets.EC2_BACKEND_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters commands="aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }} && docker pull ${{ secrets.ECR_REPO_URL_BACKEND }}:latest && docker stop tienda-backend || true && docker rm tienda-backend || true && docker run -d --name tienda-backend -p 3001:3001 -e DB_HOST=i-0a43726c03ab04643 -e DB_USER=root -e DB_PASSWORD=admin123 -e DB_NAME=tienda_perritos ${{ secrets.ECR_REPO_URL_BACKEND }}:latest"
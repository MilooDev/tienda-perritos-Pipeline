name: CI/CD Frontend
on:
  push:
    paths:
      - 'frontend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        
      - name: Configurar AWS
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}
          
      - name: Login ECR
        run: aws ecr get-login-password | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}
        
      - name: Build imagen
        run: docker build -t frontend ./frontend
        
      - name: Tag imagen
        run: docker tag frontend:latest ${{ secrets.ECR_REPO_URL_FRONTEND }}:latest
        
      - name: Push imagen
        run: docker push ${{ secrets.ECR_REPO_URL_FRONTEND }}:latest
        
      - name: Deploy a EC2 Frontend via SSM
        run: |
          aws ssm send-command \
            --instance-ids ${{ secrets.EC2_FRONTEND_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters commands="aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }} && docker pull ${{ secrets.ECR_REPO_URL_FRONTEND }}:latest && docker stop tienda-frontend || true && docker rm tienda-frontend || true && docker run -d --name tienda-frontend -p 80:80 ${{ secrets.ECR_REPO_URL_FRONTEND }}:latest"
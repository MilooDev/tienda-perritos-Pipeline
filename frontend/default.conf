server {
    listen 80;
    server_name _;
    charset utf-8;

    root /usr/share/nginx/html;
    index index.html;

    # Enrutamiento para la aplicación de página única (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy inverso configurado hacia la dirección IP estable de la tarea ECS Fargate
    location /api/ {
        proxy_pass http://10.0.15.72:3001;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
